spring.application.name=api-gateway

server.port=8080

management.endpoints.web.exposure.include=*

# =====================================================
# USER SERVICE
# =====================================================

spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=http://user-service:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/users/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=RewritePath=/api/users(?<segment>/?.*), /users${segment}

# =====================================================
# AUTH SERVICE
# =====================================================

spring.cloud.gateway.server.webflux.routes[1].id=auth-service
spring.cloud.gateway.server.webflux.routes[1].uri=http://user-service:8081
