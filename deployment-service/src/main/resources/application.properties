server.port=8083

spring.datasource.url=jdbc:postgresql://postgres:5432/idp_user
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

catalog.service.url=http://catalog-service:8082
audit.service.url=http://audit-service:8084

# Kubernetes
kubernetes.namespace.default=dev

# Logging
logging.level.com.idp.deployment=INFO
logging.level.io.fabric8.kubernetes.client=INFO
logging.level.org.springframework.web=INFO